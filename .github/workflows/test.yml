name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # `res/local` is gitignored; integration tests expect prebuilt wasm (see `build_all.sh`).
      - name: Build contract wasm for integration tests
        run: |
          set -euo pipefail
          mkdir -p res/local
          cargo build \
            -p lockup-contract \
            -p venear-contract \
            -p voting-contract \
            -p sandbox-staking-whitelist-contract \
            -p staking-contract \
            --target wasm32-unknown-unknown \
            --release
          d=target/wasm32-unknown-unknown/release
          cp "$d/lockup_contract.wasm" res/local/
          cp "$d/venear_contract.wasm" res/local/
          cp "$d/voting_contract.wasm" res/local/
          cp "$d/sandbox_staking_whitelist_contract.wasm" res/local/
          cp "$d/staking_contract.wasm" res/local/

      - name: cargo test
        run: cargo test --workspace --all-features
