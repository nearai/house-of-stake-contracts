name: Clippy

on:
  push:
    branches: [main, master, feat/stake-dao]
  pull_request:
    branches: [main, master, feat/stake-dao]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.86.0
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      # `integration-tests` depends on `near-workspaces` sandbox support;
      # test coverage for it runs in the dedicated test workflow.
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features --exclude integration-tests
